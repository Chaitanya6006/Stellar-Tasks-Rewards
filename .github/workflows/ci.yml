name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  frontend-ci:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm install
        working-directory: frontend

      - name: Build Frontend
        run: npm run build
        working-directory: frontend

  contracts-ci:
    name: Smart Contracts Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/**/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build token_contract
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contracts/token_contract

      - name: Build task_contract
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contracts/task_contract

      - name: Build leaderboard_contract
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contracts/leaderboard_contract

      - name: Build achievement_nft
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contracts/achievement_nft

      - name: Test all contracts
        run: |
          cd contracts/token_contract && cargo test
          cd ../task_contract && cargo test
          cd ../leaderboard_contract && cargo test
          cd ../achievement_nft && cargo test
